---
# golangci-lint configuration (v2 schema).
#
# The set is deliberately broad — we'd rather see a lint warning early than
# discover a subtle bug at runtime. Per-rule exclusions cover the unavoidable
# false positives. Tests get a slightly looser ruleset to avoid lint noise on
# mock-driven setups.
# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - asciicheck
    - bodyclose
    - contextcheck
    - copyloopvar
    - dupword
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - gocheckcompilerdirectives
    - gocritic
    - gocyclo
    - godot
    - gosec
    - intrange
    - makezero
    - mirror
    - misspell
    - nilerr
    - nilnesserr
    - nlreturn
    - noctx
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - reassign
    - recvcheck
    - revive
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
    - wsl_v5

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - unnamedResult
        - tooManyResultsChecker
        - ifElseChain
        - octalLiteral
        - whyNoLint

    gosec:
      excludes:
        - G104  # duplicates errcheck
        - G117  # exported Password fields are GMCP wire names, not stored secrets
        - G304  # log files open operator-controlled paths intentionally

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unreachable-code
        - name: var-declaration

    staticcheck:
      checks:
        - all
        - "-ST1000"  # missing package-level doc comment; not enforced here

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - dupword       # test case names often repeat domain tokens intentionally
          - errcheck
          - gocritic      # tests routinely shadow imports and re-use the same arg
          - gosec
          - intrange      # test-loop counters are clear enough either way
          - noctx
          - perfsprint    # tests aren't perf-sensitive enough to warrant the rewrite
          - prealloc
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/nogfx/nogfx
